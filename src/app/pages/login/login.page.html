<ion-content [fullscreen]="true" class="login-background">

<div class="contenedor">

<div class="logo-container">

<img
src="assets/images/logo-restaurante.png"
class="logo"
>

</div>

<h2>Iniciar Sesión</h2>

<div class="mensaje-error">

<ion-icon
name="alert-circle"
></ion-icon>

<span>
Correo electrónico o contraseña incorrectos
</span>

</div>

<ion-item class="input-personalizado">

<ion-icon
name="mail"
slot="start"
></ion-icon>

<ion-input
placeholder="Correo electrónico"
[(ngModel)]="correo"
></ion-input>

</ion-item>

<ion-item class="input-personalizado">

<ion-icon
name="lock-closed"
slot="start"
></ion-icon>

<ion-input
placeholder="Contraseña"
[(ngModel)]="password"
[type]="mostrarPassword ? 'text':'password'">
</ion-input>

<ion-icon
slot="end"
[name]="mostrarPassword ? 'eye':'eye-off'"
(click)="mostrarPassword=!mostrarPassword">
</ion-icon>

</ion-item>

<div class="olvide">

<a>
¿Olvidaste tu contraseña?
</a>

</div>

<ion-button
expand="block"
class="boton-login">

Iniciar Sesión

</ion-button>

<div class="footer">

Gestión de Inventario para Restaurantes

</div>

</div>

</ion-content>
